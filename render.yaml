databases:
  - name: slack-agent-db
    plan: basic-256mb

services:
  - type: web
    name: slack-ai-agent
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slack-agent-db
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_PRIVATE_CHANNEL_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COMPANY_NAME
        value: Your Company Name
      - key: COMPANY_PRODUCT
        value: Your Commercial Product
